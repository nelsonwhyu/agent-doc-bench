app = "agent-doc-bench-mcp"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  MCP_PUBLIC_HOSTNAME = "agent-doc-bench-mcp.fly.dev"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
