name: Evaluate doc draft

on:
  repository_dispatch:
    types: [evaluate-doc-draft]
  # Manual/engineer-triggered equivalent of the same event — also lets this
  # workflow be tested (via `gh workflow run ... --ref <branch>`) before it's
  # merged to the default branch, since repository_dispatch only fires for
  # workflow files that already exist there.
  workflow_dispatch:
    inputs:
      api:
        required: true
        type: string
      value:
        required: true
        type: string
      content:
        required: true
        type: string
      experiment:
        required: true
        type: string

# The PM's draft (client_payload.content / inputs.content) is untrusted
# text. Per GitHub's script-injection guidance, it only ever crosses
# through the `env:` mapping below — a single, safe substitution into a
# real environment variable — and gets read back out via os.environ in
# apply_draft.py. It is never interpolated directly into a `run:` shell
# string, and this job never commits or pushes anything.
jobs:
  evaluate:
    runs-on: ubuntu-latest
    env:
      DRAFT_API: ${{ github.event.inputs.api || github.event.client_payload.api }}
      DRAFT_VALUE: ${{ github.event.inputs.value || github.event.client_payload.value }}
      DRAFT_CONTENT: ${{ github.event.inputs.content || github.event.client_payload.content }}
      DRAFT_EXPERIMENT: ${{ github.event.inputs.experiment || github.event.client_payload.experiment }}
      BLOOMBERG_MODE: mock
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Install dependencies (mock mode only — skip the live/blpapi and dev groups)
        run: uv sync --no-default-groups

      - name: Apply the draft to a local-only working copy (never committed)
        run: uv run python .github/workflows/scripts/apply_draft.py

      - name: Validate the draft (hard gate before spending Anthropic/LangSmith budget)
        run: uv run agent-doc-bench validate-docs --strict

      - name: Run the ablation
        run: uv run agent-doc-bench run "experiments/${DRAFT_EXPERIMENT}.yaml"

      - name: Render the report as Markdown
        # Markdown, not JSON: report_formatters.render_markdown() needs the
        # real ExperimentResult dataclass (with .mean_score() etc. on nested
        # Variant objects) to do anything useful — render_json() just does
        # asdict(result), which would force the MCP server to reconstruct
        # those dataclasses from plain JSON just to reuse the same
        # formatter. Rendering here, where the dataclasses already exist,
        # means get_evaluation_report can just return this text as-is.
        run: uv run agent-doc-bench report "experiments/${DRAFT_EXPERIMENT}.yaml" --format markdown --output report.md

      - uses: actions/upload-artifact@v4
        with:
          name: report
          path: report.md
